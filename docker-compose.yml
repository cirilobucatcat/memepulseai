services:
  web:
    build: .
    container_name: flask_app
    command: flask --app flaskr run --host=0.0.0.0 --port=5000 --debug
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - PYTHONPATH=/app
      - FLASK_DEBUG=1
      - WATCHDOG_FORCE_POLLING=true
    depends_on:
      - db
    volumes:
      - ./:/app

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  adminer:  # 👈 NEW SERVICE
    image: adminer
    container_name: adminer_dev
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data: